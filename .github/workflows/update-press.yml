name: Update Press Data

on:
  schedule:
    # Every day at 8 AM EST (13:00 UTC)
    - cron: '0 13 * * *'
  workflow_dispatch: # allow manual runs from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch press data from Google Sheets
        env:
          PRESS_SHEET_URL: ${{ secrets.PRESS_SHEET_URL }}
        run: python3 scripts/fetch_press.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/press.json
          if git diff --staged --quiet; then
            echo "No changes to press data."
          else
            git commit -m "chore: update press data from Google Sheets [skip ci]"
            git push
          fi
